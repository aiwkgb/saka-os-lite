name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate demo data
        run: python3 scripts/validate.py
      - name: Generate outputs
        run: |
          python3 scripts/generate_brief.py
          python3 scripts/generate_log_template.py
          python3 scripts/sync_dashboard_data.py
      - name: Check dashboard JavaScript syntax
        run: |
          node --check dashboard/app.js
          node --check dashboard/app-data.js
